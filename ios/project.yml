name: PortaSplitMonitor
options:
  bundleIdPrefix: fr.portasplit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
targets:
  PortaSplitMonitor:
    type: application
    platform: iOS
    sources:
      - path: PortaSplitMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.portasplit.monitor
        INFOPLIST_FILE: PortaSplitMonitor/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    info:
      path: PortaSplitMonitor/Info.plist
      properties:
        CFBundleDisplayName: PortaSplit
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - fr.portasplit.monitor.refresh
